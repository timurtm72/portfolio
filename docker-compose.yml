services:
  # Caddy - Reverse Proxy с автоматическим HTTPS
  caddy:
    image: caddy:2-alpine
    container_name: portfolio-caddy
    restart: unless-stopped
    ports:
      - "80:80"      # HTTP (автоматический редирект на HTTPS)
      - "443:443"    # HTTPS
      - "443:443/udp" # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    networks:
      - portfolio-network
    depends_on:
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:15-alpine
    container_name: portfolio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-portfolio_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-portfolio_password}
      POSTGRES_DB: portfolio_db
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - portfolio-network
    # ⚠️ БЕЗОПАСНОСТЬ: Порты БД НЕ публикуются наружу!
    # expose вместо ports - доступ только внутри Docker сети
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-portfolio_user} -d portfolio_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: portfolio-backend
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=db
    # ⚠️ БЕЗОПАСНОСТЬ: Порт 8080 НЕ публикуется наружу!
    # expose вместо ports - доступ только внутри Docker сети
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  frontend:
    build: ./frontend
    container_name: portfolio-frontend
    restart: unless-stopped
    env_file:
      - path: ./frontend/.env
        required: false
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - portfolio-network

networks:
  portfolio-network:
    name: portfolio-network
    driver: bridge

volumes:
  db_data:
  caddy_data:     # SSL сертификаты и данные Caddy
  caddy_config:   # Конфигурация Caddy
  caddy_logs:     # Логи доступа
